AWSTemplateFormatVersion: "2010-09-09"
Description: End-to-end streaming pipeline starter stack

Parameters:
  ProjectName:
    Type: String
    Default: dspipeline
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - stage
      - prod
  ApiIngestFunctionCodeS3Bucket:
    Type: String
    Default: ""
  ApiIngestFunctionCodeS3Key:
    Type: String
    Default: ""
  DdbNormalizerFunctionCodeS3Bucket:
    Type: String
    Default: ""
  DdbNormalizerFunctionCodeS3Key:
    Type: String
    Default: ""
  AthenaResultLocation:
    Type: String
    Default: ""
    Description: Optional S3 URI for Athena query results

Conditions:
  UseApiIngestS3Code: !Not [!Equals [!Ref ApiIngestFunctionCodeS3Bucket, ""]]
  UseDdbNormalizerS3Code: !Not [!Equals [!Ref DdbNormalizerFunctionCodeS3Bucket, ""]]
  HasAthenaResultLocation: !Not [!Equals [!Ref AthenaResultLocation, ""]]

Resources:
  RawBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-${Environment}-${AWS::AccountId}-${AWS::Region}-raw"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  EventStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-events"
      ShardCount: 1
      RetentionPeriodHours: 24

  CdcTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-${Environment}-orders"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-firehose-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: firehose-s3-write
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt RawBucket.Arn
                  - !Sub "${RawBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - logs:PutLogEvents
                Resource: "*"

  FirehoseStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub "${ProjectName}-${Environment}-raw-firehose"
      DeliveryStreamType: DirectPut
      S3DestinationConfiguration:
        BucketARN: !GetAtt RawBucket.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
        Prefix: raw/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/
        ErrorOutputPrefix: errors/!{firehose:error-output-type}/
        BufferingHints:
          IntervalInSeconds: 60
          SizeInMBs: 5
        CompressionFormat: GZIP

  ApiIngestRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-api-ingest-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: api-ingest-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                Resource: !GetAtt EventStream.Arn

  ApiIngestFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-api-ingest"
      Runtime: python3.11
      Handler: app.lambda_handler
      Role: !GetAtt ApiIngestRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          STREAM_NAME: !Ref EventStream
      Code: !If
        - UseApiIngestS3Code
        - S3Bucket: !Ref ApiIngestFunctionCodeS3Bucket
          S3Key: !Ref ApiIngestFunctionCodeS3Key
        - ZipFile: |
            import json
            import os
            import uuid
            from datetime import datetime, timezone
            import boto3
            kinesis = boto3.client("kinesis")
            def lambda_handler(event, context):
                body = json.loads(event.get("body") or "{}")
                payload = {
                    "event_id": str(uuid.uuid4()),
                    "source": "api_gateway",
                    "event_ts": datetime.now(timezone.utc).isoformat(),
                    "schema_version": 1,
                    "payload": body
                }
                kinesis.put_record(
                    StreamName=os.environ["STREAM_NAME"],
                    Data=json.dumps(payload).encode("utf-8"),
                    PartitionKey="api-source"
                )
                return {"statusCode": 200, "body": json.dumps({"ok": True})}

  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-ingestion-api"

  RestApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: events
      RestApiId: !Ref RestApi

  RestApiMethodPost:
    Type: AWS::ApiGateway::Method
    Properties:
      HttpMethod: POST
      AuthorizationType: NONE
      ResourceId: !Ref RestApiResource
      RestApiId: !Ref RestApi
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiIngestFunction.Arn}/invocations"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - RestApiMethodPost
    Properties:
      RestApiId: !Ref RestApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      StageName: v1

  ApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ApiIngestFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/POST/events"

  DdbNormalizerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-ddb-normalizer-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ddb-normalizer-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - firehose:PutRecordBatch
                Resource: !GetAtt FirehoseStream.Arn

  DdbNormalizerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-ddb-normalizer"
      Runtime: python3.11
      Handler: app.lambda_handler
      Role: !GetAtt DdbNormalizerRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          FIREHOSE_STREAM_NAME: !Ref FirehoseStream
      Code: !If
        - UseDdbNormalizerS3Code
        - S3Bucket: !Ref DdbNormalizerFunctionCodeS3Bucket
          S3Key: !Ref DdbNormalizerFunctionCodeS3Key
        - ZipFile: |
            import json
            import os
            import uuid
            from datetime import datetime, timezone
            import boto3
            firehose = boto3.client("firehose")
            def lambda_handler(event, context):
                stream_name = os.environ["FIREHOSE_STREAM_NAME"]
                records = []
                for record in event.get("Records", []):
                    payload = {
                        "event_id": str(uuid.uuid4()),
                        "source": "dynamodb_stream",
                        "event_ts": datetime.now(timezone.utc).isoformat(),
                        "schema_version": 1,
                        "event_name": record.get("eventName", "UNKNOWN"),
                        "payload": record.get("dynamodb", {}).get("NewImage", {})
                    }
                    records.append({"Data": (json.dumps(payload) + "\n").encode("utf-8")})
                if records:
                    firehose.put_record_batch(DeliveryStreamName=stream_name, Records=records)
                return {"ok": True, "records": len(records)}

  DdbStreamMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt CdcTable.StreamArn
      FunctionName: !Ref DdbNormalizerFunction
      BatchSize: 100
      StartingPosition: LATEST

  AthenaWorkgroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-wg"
      Description: Athena workgroup for streaming pipeline tutorial
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: false
        PublishCloudWatchMetricsEnabled: true
        ResultConfiguration:
          OutputLocation: !If
            - HasAthenaResultLocation
            - !Ref AthenaResultLocation
            - !Sub "s3://${RawBucket}/athena-results/"

Outputs:
  StreamName:
    Value: !Ref EventStream
  FirehoseName:
    Value: !Ref FirehoseStream
  RawBucketName:
    Value: !Ref RawBucket
  CdcTableName:
    Value: !Ref CdcTable
  ApiInvokeUrl:
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/v1/events"
  AthenaWorkgroupName:
    Value: !Ref AthenaWorkgroup
