name: Deploy Streaming Stack

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stage
          - prod
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/deploy-streaming-stack.yml"

permissions:
  id-token: write
  contents: read

env:
  STACK_NAME: streaming-pipeline-${{ github.event.inputs.environment || 'dev' }}
  PROJECT_NAME: dspipeline

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate CloudFormation template
        run: aws cloudformation validate-template --template-body file://infra/streaming-stack.yml

      - name: Deploy stack
        run: |
          aws cloudformation deploy \
            --template-file infra/streaming-stack.yml \
            --stack-name "${STACK_NAME}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              ProjectName="${PROJECT_NAME}" \
              Environment="${{ github.event.inputs.environment || 'dev' }}"

      - name: Print stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --query "Stacks[0].Outputs" \
            --output table
